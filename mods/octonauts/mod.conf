name = octonauts
title = Octonauts Starter
description = Ein kleines Einsteiger-Mod zum gemeinsamen Entdecken: Octopod-Bauteile, ein Vegimal-Keks, ein freundliches Vegimal-Wesen, eine Krabbe und ein Teleport zur eigenen Basis. Gedacht zum Spielen UND zum gemeinsamen Erweitern mit Kindern.
# Optionale Abhaengigkeiten: eine Mob-API.  Wenn mobs_redo (Minetest Game)
# ODER mcl_mobs (VoxeLibre / Mineclonia) vorhanden ist, gibt es eine echte
# Krabbe als Tier.  Ist keine davon da, laeuft alles andere trotzdem - nur die
# lebende Krabbe fehlt dann.  "optional_depends" erzwingt die Mods NICHT, es
# sorgt nur dafuer, dass wir NACH der Mob-API geladen werden, falls sie da ist.
optional_depends = mobs, mcl_mobs
